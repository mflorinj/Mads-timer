<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ugeopgørelse</title>
<style>
  :root{
    --ink:#15233B;--paper:#F5F6F8;--surface:#FFFFFF;--accent:#0F766E;
    --accent-soft:#E3F1EF;--line:#E3E7ED;--muted:#6B7682;--warn:#B45309;--radius:10px;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{font-family:var(--sans);color:var(--ink);background:var(--paper);line-height:1.45;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1060px;margin:0 auto;padding:28px 20px 64px}

  header{display:flex;flex-wrap:wrap;align-items:center;gap:18px 28px;padding-bottom:18px;border-bottom:2px solid var(--ink)}
  .title h1{font-size:26px;letter-spacing:-.02em;margin:0;font-weight:650}
  .title .sub{color:var(--muted);font-size:13px;margin-top:2px}

  .weeknav{display:flex;align-items:center;gap:10px;margin-left:auto}
  .nav{width:40px;height:40px;border-radius:9px;border:1px solid var(--line);background:var(--surface);cursor:pointer;font-size:16px;color:var(--ink);display:flex;align-items:center;justify-content:center}
  .nav:hover{border-color:var(--ink)}
  .weekbox{display:flex;align-items:baseline;gap:8px;background:var(--ink);color:#fff;padding:8px 14px;border-radius:9px}
  .weekbox .lab{font-size:11px;text-transform:uppercase;letter-spacing:.08em;opacity:.75}
  .weekbox input{font:inherit;background:transparent;border:none;color:#fff;font-weight:650;text-align:center;font-variant-numeric:tabular-nums}
  .weekbox input#ugenr{font-size:22px;width:46px}
  .weekbox input#aar{font-size:14px;width:52px;opacity:.85}
  .weekbox input:focus{outline:2px solid var(--accent-soft);outline-offset:2px;border-radius:4px}
  .navn{display:flex;flex-direction:column;gap:5px}
  .navn label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:600}
  .navn input{font:inherit;font-size:15px;padding:8px 10px;border:1px solid var(--line);border-radius:8px;background:var(--surface);min-width:130px;color:var(--ink)}
  input:focus,select:focus{outline:2px solid var(--accent);outline-offset:1px}

  .saved{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:16px 0 4px;min-height:30px}
  .saved .cap{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);font-weight:600;margin-right:2px}
  .wk{font:inherit;font-size:13px;cursor:pointer;border:1px solid var(--line);background:var(--surface);color:var(--muted);padding:4px 10px;border-radius:20px;font-variant-numeric:tabular-nums}
  .wk:hover{border-color:var(--ink);color:var(--ink)}
  .wk.active{background:var(--accent);border-color:var(--accent);color:#fff}
  .saved .none{font-size:13px;color:var(--muted)}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;margin-top:10px}
  .scroll{overflow-x:auto}
  table{border-collapse:collapse;width:100%;min-width:760px}
  thead th{background:var(--ink);color:#fff;font-size:11px;text-transform:uppercase;letter-spacing:.06em;font-weight:600;text-align:left;padding:11px 12px;white-space:nowrap}
  thead th.num{text-align:right}
  tbody td{padding:4px 8px;border-bottom:1px solid var(--line);vertical-align:middle}
  tbody tr:last-child td{border-bottom:none}
  tbody input,tbody select{font:inherit;font-size:14px;width:100%;border:1px solid transparent;background:transparent;padding:7px 8px;border-radius:7px;color:var(--ink)}
  tbody input:hover,tbody select:hover{border-color:var(--line)}
  tbody input:focus,tbody select:focus{background:var(--surface)}
  td.t-day{width:120px}td.t-time{width:104px}td.t-pause{width:96px}td.t-timer{width:84px}td.t-act{width:40px}
  .cell-num input{text-align:right;font-variant-numeric:tabular-nums}
  .timer{text-align:right;font-variant-numeric:tabular-nums;font-weight:600;padding:7px 10px}
  .timer.zero{color:#AEB6C0;font-weight:500}
  .del{border:none;background:none;cursor:pointer;color:#AEB6C0;font-size:18px;line-height:1;width:28px;height:28px;border-radius:6px}
  .del:hover{background:#FBEAEA;color:#C0392B}
  tfoot td{padding:13px 12px;border-top:2px solid var(--ink);font-weight:600}
  tfoot .lbl{text-align:right;text-transform:uppercase;font-size:11px;letter-spacing:.07em;color:var(--muted)}
  tfoot .total{text-align:right;font-size:18px;font-variant-numeric:tabular-nums;color:var(--accent)}

  .toolbar{display:flex;flex-wrap:wrap;gap:10px;margin:16px 0 26px}
  button.btn{font:inherit;font-size:14px;font-weight:550;cursor:pointer;border-radius:8px;padding:9px 15px;border:1px solid var(--line);background:var(--surface);color:var(--ink);display:inline-flex;align-items:center;gap:7px}
  button.btn:hover{border-color:var(--ink)}
  button.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  button.btn.primary:hover{background:#0c655e}
  button.btn.ghost{color:var(--muted)}
  button.btn.ghost:hover{color:var(--warn);border-color:var(--warn)}

  .summary h2{font-size:13px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin:0 0 12px}
  .sumgrid{display:flex;flex-wrap:wrap;gap:10px}
  .chip{background:var(--surface);border:1px solid var(--line);border-radius:9px;padding:10px 14px;min-width:140px}
  .chip .k{font-size:13px;color:var(--muted);margin-bottom:2px}
  .chip .v{font-size:18px;font-weight:650;font-variant-numeric:tabular-nums}
  .chip .v span{font-size:12px;font-weight:500;color:var(--muted);margin-left:3px}
  .empty{color:var(--muted);font-size:14px}

  @media print{
    body{background:#fff}.wrap{max-width:none;padding:0}
    .toolbar,.saved,.nav,.del,.t-act,thead th.t-act{display:none !important}
    .card{border:none;border-radius:0}
    .weekbox{background:#fff;color:#000;padding:0}.weekbox input{color:#000}
    thead th{background:#fff;color:#000;border-bottom:2px solid #000}
    tbody input,tbody select{border:none;-webkit-appearance:none;appearance:none}
    .chip{break-inside:avoid}
  }
  @media (max-width:600px){.weeknav{margin-left:0}header{gap:14px}}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="title">
      <h1>Ugeopgørelse</h1>
      <div class="sub">Tidsregistrering pr. kunde og opgave</div>
    </div>
    <div class="weeknav">
      <button class="nav" id="prev" title="Forrige uge" aria-label="Forrige uge">◀</button>
      <div class="weekbox">
        <span class="lab">Uge</span>
        <input id="ugenr" type="number" min="1" max="53" inputmode="numeric">
        <input id="aar" type="number" min="2000" max="2099" inputmode="numeric">
      </div>
      <button class="nav" id="next" title="Næste uge" aria-label="Næste uge">▶</button>
      <div class="navn">
        <label for="navn">Navn</label>
        <input id="navn" type="text" placeholder="Dit navn">
      </div>
    </div>
  </header>

  <div class="saved" id="saved"></div>

  <div class="card scroll">
    <table>
      <thead>
        <tr>
          <th class="t-day">Ugedag</th><th class="t-time">Start</th><th class="t-time">Slut</th>
          <th class="t-pause">Pause (min)</th><th>Kunde</th><th>Opgave</th>
          <th class="num t-timer">Timer</th><th class="t-act"></th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
      <tfoot>
        <tr><td class="lbl" colspan="6">I alt timer</td><td class="total" id="grandTotal">0,00</td><td></td></tr>
      </tfoot>
    </table>
  </div>

  <div class="toolbar">
    <button class="btn primary" id="addRow">+ Tilføj række</button>
    <button class="btn" id="printBtn">Udskriv / PDF</button>
    <button class="btn" id="csvBtn">Eksportér CSV</button>
    <button class="btn ghost" id="resetBtn">Ryd denne uge</button>
  </div>

  <section class="summary">
    <h2>Fordeling pr. kunde</h2>
    <div class="sumgrid" id="sumgrid"><div class="empty">Endnu ingen timer registreret.</div></div>
  </section>

</div>

<datalist id="kunder">
  <option value="Specsavers"></option><option value="Fagerholm"></option><option value="Intern"></option>
</datalist>

<script>
(function(){
  "use strict";
  var DAYS=["Mandag","Tirsdag","Onsdag","Torsdag","Fredag","Lørdag","Søndag"];
  var KEY="ugeopgoerelse_v2";

  var store={
    get:function(){try{return JSON.parse(localStorage.getItem(KEY));}catch(e){return null;}},
    set:function(v){try{localStorage.setItem(KEY,JSON.stringify(v));}catch(e){}}
  };

  function isoWeek(d){
    d=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
    var day=d.getUTCDay()||7;d.setUTCDate(d.getUTCDate()+4-day);
    var ys=new Date(Date.UTC(d.getUTCFullYear(),0,1));
    return Math.ceil((((d-ys)/86400000)+1)/7);
  }
  function isoYear(d){
    d=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
    var day=d.getUTCDay()||7;d.setUTCDate(d.getUTCDate()+4-day);
    return d.getUTCFullYear();
  }
  function weeksInYear(y){return isoWeek(new Date(y,11,28));}

  function freshRows(){return DAYS.map(function(d){return {day:d,start:"",slut:"",pause:"",kunde:"",opgave:""};});}
  function keyOf(y,w){return y+"-"+(w<10?"0"+w:w);}
  function clone(o){return JSON.parse(JSON.stringify(o));}

  var now=new Date();
  var data=store.get()||{navn:"",weeks:{},cur:{year:isoYear(now),week:isoWeek(now)}};
  if(!data.weeks)data.weeks={};
  if(!data.cur)data.cur={year:isoYear(now),week:isoWeek(now)};
  var cur=data.cur;
  var rows=data.weeks[keyOf(cur.year,cur.week)]?clone(data.weeks[keyOf(cur.year,cur.week)]):freshRows();

  var elRows=document.getElementById("rows"),elUge=document.getElementById("ugenr"),
      elAar=document.getElementById("aar"),elNavn=document.getElementById("navn"),
      elTotal=document.getElementById("grandTotal"),elSum=document.getElementById("sumgrid"),
      elSaved=document.getElementById("saved");

  elNavn.value=data.navn||"";

  function nf(n){return n.toLocaleString("da-DK",{minimumFractionDigits:2,maximumFractionDigits:2});}
  function esc(s){return (s||"").replace(/"/g,"&quot;").replace(/</g,"&lt;");}
  function toMin(t){if(!t||t.indexOf(":")<0)return null;var p=t.split(":");var h=parseInt(p[0],10),m=parseInt(p[1],10);return isNaN(h)||isNaN(m)?null:h*60+m;}
  function rowHours(r){var s=toMin(r.start),e=toMin(r.slut);if(s===null||e===null)return 0;var d=e-s;if(d<0)d+=1440;var h=(d-(parseFloat(r.pause)||0))/60;return h>0?h:0;}
  function hasData(rs){return rs.some(function(r){return r.start||r.slut||r.pause||r.kunde||r.opgave;});}

  function persist(){
    var k=keyOf(cur.year,cur.week);
    if(hasData(rows))data.weeks[k]=clone(rows);else delete data.weeks[k];
    data.navn=elNavn.value;data.cur=cur;
    store.set(data);renderSaved();
  }

  function setWeekFields(){elUge.value=cur.week;elAar.value=cur.year;}

  function loadWeek(){
    var k=keyOf(cur.year,cur.week);
    rows=data.weeks[k]?clone(data.weeks[k]):freshRows();
    setWeekFields();render();
  }

  function goto(y,w){persist();cur={year:y,week:w};loadWeek();persist();}

  function shift(delta){
    var w=cur.week+delta,y=cur.year,max=weeksInYear(y);
    if(w<1){y--;w=weeksInYear(y);}else if(w>max){y++;w=1;}
    goto(y,w);
  }

  function render(){
    elRows.innerHTML="";
    rows.forEach(function(r,i){
      var opts=DAYS.map(function(d){return '<option'+(d===r.day?" selected":"")+'>'+d+'</option>';}).join("");
      var h=rowHours(r);
      var tr=document.createElement("tr");
      tr.innerHTML=
        '<td class="t-day"><select data-i="'+i+'" data-f="day">'+opts+'</select></td>'+
        '<td class="t-time"><input type="time" data-i="'+i+'" data-f="start" value="'+r.start+'"></td>'+
        '<td class="t-time"><input type="time" data-i="'+i+'" data-f="slut" value="'+r.slut+'"></td>'+
        '<td class="t-pause cell-num"><input type="number" min="0" step="5" inputmode="numeric" data-i="'+i+'" data-f="pause" value="'+r.pause+'" placeholder="0"></td>'+
        '<td><input type="text" list="kunder" data-i="'+i+'" data-f="kunde" value="'+esc(r.kunde)+'" placeholder="Kunde"></td>'+
        '<td><input type="text" data-i="'+i+'" data-f="opgave" value="'+esc(r.opgave)+'" placeholder="Hvad blev der lavet"></td>'+
        '<td class="timer'+(h===0?" zero":"")+'">'+nf(h)+'</td>'+
        '<td class="t-act"><button class="del" data-del="'+i+'" title="Slet række">×</button></td>';
      elRows.appendChild(tr);
    });
    totals();
  }

  function totals(){
    var total=0,byCust={};
    rows.forEach(function(r){var h=rowHours(r);total+=h;if(h>0){var k=(r.kunde||"").trim()||"Uden kunde";byCust[k]=(byCust[k]||0)+h;}});
    elTotal.textContent=nf(total);
    var keys=Object.keys(byCust).sort();
    elSum.innerHTML=keys.length?keys.map(function(k){
      return '<div class="chip"><div class="k">'+esc(k)+'</div><div class="v">'+nf(byCust[k])+'<span>t</span></div></div>';
    }).join(""):'<div class="empty">Endnu ingen timer registreret.</div>';
  }

  function renderSaved(){
    var keys=Object.keys(data.weeks);
    var curKey=keyOf(cur.year,cur.week);
    var html='<span class="cap">Gemte uger</span>';
    if(!keys.length && !hasData(rows)){elSaved.innerHTML=html+'<span class="none">— ingen endnu</span>';return;}
    if(keys.indexOf(curKey)<0)keys.push(curKey);
    keys.sort();
    elSaved.innerHTML=html+keys.map(function(k){
      var p=k.split("-"),y=p[0],w=parseInt(p[1],10);
      return '<button class="wk'+(k===curKey?" active":"")+'" data-y="'+y+'" data-w="'+w+'">U'+w+' · '+y+'</button>';
    }).join("");
  }

  elRows.addEventListener("input",function(e){
    var t=e.target,i=t.getAttribute("data-i"),f=t.getAttribute("data-f");if(i===null)return;
    rows[i][f]=t.value;
    var cell=t.closest("tr").querySelector(".timer");var h=rowHours(rows[i]);
    cell.textContent=nf(h);cell.className="timer"+(h===0?" zero":"");
    totals();persist();
  });
  elRows.addEventListener("change",function(e){
    if(e.target.getAttribute("data-f")==="day"){rows[e.target.getAttribute("data-i")].day=e.target.value;persist();}
  });
  elRows.addEventListener("click",function(e){
    var d=e.target.getAttribute("data-del");
    if(d!==null){rows.splice(parseInt(d,10),1);render();persist();}
  });

  document.getElementById("prev").addEventListener("click",function(){shift(-1);});
  document.getElementById("next").addEventListener("click",function(){shift(1);});

  function jump(){
    var w=parseInt(elUge.value,10),y=parseInt(elAar.value,10);
    if(isNaN(w)||w<1)w=1;if(w>53)w=53;if(isNaN(y))y=cur.year;
    goto(y,w);
  }
  elUge.addEventListener("change",jump);
  elAar.addEventListener("change",jump);
  elNavn.addEventListener("input",persist);

  elSaved.addEventListener("click",function(e){
    var b=e.target.closest(".wk");if(!b)return;
    goto(parseInt(b.getAttribute("data-y"),10),parseInt(b.getAttribute("data-w"),10));
  });

  document.getElementById("addRow").addEventListener("click",function(){
    rows.push({day:"Mandag",start:"",slut:"",pause:"",kunde:"",opgave:""});render();persist();
  });
  document.getElementById("printBtn").addEventListener("click",function(){window.print();});
  document.getElementById("resetBtn").addEventListener("click",function(){
    if(!confirm("Ryd uge "+cur.week+"/"+cur.year+"? Rækkerne tømmes."))return;
    rows=freshRows();delete data.weeks[keyOf(cur.year,cur.week)];render();persist();
  });

  document.getElementById("csvBtn").addEventListener("click",function(){
    var sep=";";function q(v){v=(v==null?"":String(v));return '"'+v.replace(/"/g,'""')+'"';}
    var lines=[];
    lines.push(q("Uge nr.")+sep+q(cur.week)+sep+q("År")+sep+q(cur.year)+sep+q("Navn")+sep+q(elNavn.value));
    lines.push("");
    lines.push(["Ugedag","Start","Slut","Pause (min)","Kunde","Opgave","Timer"].map(q).join(sep));
    var total=0;
    rows.forEach(function(r){var h=rowHours(r);total+=h;lines.push([r.day,r.start,r.slut,r.pause,r.kunde,r.opgave,nf(h)].map(q).join(sep));});
    lines.push(["","","","","","I alt",nf(total)].map(q).join(sep));
    var blob=new Blob(["\uFEFF"+lines.join("\r\n")],{type:"text/csv;charset=utf-8;"});
    var a=document.createElement("a");a.href=URL.createObjectURL(blob);
    a.download="ugeopgoerelse-"+cur.year+"-uge"+cur.week+".csv";
    document.body.appendChild(a);a.click();document.body.removeChild(a);
  });

  setWeekFields();render();renderSaved();
})();
</script>
</body>
</html>
